<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dispensa Smart - Gestione Inventario Casa</title>
    
    <!-- INCLUSIONE DELLA LIBRERIA CLIENT UFFICIALE DI SUPABASE VIA CDN -->
    <script src="https://jsdelivr.net"></script>
    
    <style>
        /* Stili Generali */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 30px;
            color: #333;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        h1 {
            margin-top: 0;
            color: #2c3e50;
            border-bottom: 3px solid #3498db;
            padding-bottom: 12px;
        }

        /* Form di inserimento in griglia */
        .form-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
        }

        .form-group.full-width {
            grid-column: span 3;
        }

        label {
            font-weight: 600;
            color: #4a5568;
            font-size: 14px;
        }

        input {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            width: 100%;
        }

        input:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        /* Il finto campo di selezione categoria */
        .finto-select {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 16px;
            background-color: #fff;
            cursor: pointer;
            text-align: left;
            font-weight: normal;
            color: #333;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .finto-select::after {
            content: "▼";
            font-size: 11px;
            color: #718096;
        }

        /* Menu ancorato lateralmente al campo Categoria */
        .menu-laterale-campo {
            position: absolute;
            top: 0;
            left: 100%;
            width: 240px;
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
            z-index: 100;
            padding: 15px;
            box-sizing: border-box;
            margin-left: 10px;
            
            visibility: hidden;
            opacity: 0;
            transform: translateX(-20px) scale(0.95);
            transition: transform 1s cubic-bezier(0.16, 1, 0.3, 1), 
                        opacity 1s cubic-bezier(0.16, 1, 0.3, 1), 
                        visibility 1s;
        }

        .menu-laterale-campo.aperto {
            visibility: visible;
            opacity: 1;
            transform: translateX(0) scale(1);
        }

        .menu-laterale-campo h3 {
            margin-top: 0;
            font-size: 15px;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-chiudi-menu {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: #a0aec0;
            padding: 0;
        }
        .btn-chiudi-menu:hover { color: #e53e3e; }

        .opzioni-lista {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .opzioni-lista::-webkit-scrollbar { width: 4px; }
        .opzioni-lista::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        .btn-opzione {
            background-color: #f7fafc;
            border: 1px solid #e2e8f0;
            padding: 10px;
            text-align: left;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .btn-opzione:hover {
            background-color: #3498db;
            color: white;
            border-color: #3498db;
            padding-left: 14px;
        }

        /* Pulsanti */
        .btn {
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-aggiungi {
            background-color: #3498db;
            width: 100%;
            grid-column: span 3;
        }
        .btn-aggiungi:hover { background-color: #2980b9; }

        .action-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-server {
            background-color: #2ecc71;
        }
        .btn-server:hover { background-color: #27ae60; }
        .btn-server:disabled { background-color: #a0aec0; cursor: not-allowed; }

        .btn-reset { background-color: #e53e3e; }
        .btn-reset:hover { background-color: #c53030; }

        /* Area Riepilogo Spesa */
        .recap-box {
            background-color: #ebf8ff;
            border-left: 4px solid #3182ce;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 25px;
            font-size: 18px;
            font-weight: bold;
            color: #2b6cb0;
        }

        /* Tabella Inventario */
        .table-container {
            margin-top: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid #e2e8f0;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #f7fafc;
            color: #4a5568;
        }

        tr:nth-child(even) {
            background-color: #f8fafc;
        }

        .btn-elimina {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-elimina:hover { background: #c53030; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Dispensa Smart - Gestione Spesa</h1>
        
        <!-- FORM DI INSERIMENTO PRODOTTI -->
        <div class="form-grid">
            <!-- Nome Prodotto -->
            <div class="form-group full-width">
                <label for="nomeProdotto">Nome Prodotto:</label>
                <input type="text" id="nomeProdotto" placeholder="Es. Pane integrale, Petto di pollo..." autocomplete="off">
            </div>

            <!-- Categoria -->
            <div class="form-group">
                <label>Categoria (Classe):</label>
                <div class="finto-select" id="campoCategoria">Seleziona...</div>
                
                <div class="menu-laterale-campo" id="menuCategorie">
                    <h3>
                        Scegli Categoria 
                        <button class="btn-chiudi-menu" id="btnChiudiMenu">&times;</button>
                    </h3>
                    <div class="opzioni-lista">
                        <button class="btn-opzione" data-valore="Frutta">Frutta</button>
                        <button class="btn-opzione" data-valore="Verdure">Verdure</button>
                        <button class="btn-opzione" data-valore="Carboidrati">Carboidrati</button>
                        <button class="btn-opzione" data-valore="Carne">Carne</button>
                        <button class="btn-opzione" data-valore="Pesce">Pesce</button>
                        <button class="btn-opzione" data-valore="Latticini">Latticini</button>
                        <button class="btn-opzione" data-valore="Uova">Uova</button>
                        <button class="btn-opzione" data-valore="Altro">Altro</button>
                    </div>
                </div>
            </div>

            <!-- Prezzo Unitario -->
            <div class="form-group">
                <label for="prezzoProdotto">Prezzo Unitario (€):</label>
                <input type="number" id="prezzoProdotto" step="0.01" min="0" placeholder="0.00" inputmode="decimal">
            </div>

            <!-- Quantità -->
            <div class="form-group">
                <label for="quantitaProdotto">Quantità:</label>
                <input type="number" id="quantitaProdotto" min="1" value="1" inputmode="numeric">
            </div>

            <!-- Data di Acquisto -->
            <div class="form-group">
                <label for="dataAcquisto">Giorno di Acquisto:</label>
                <input type="date" id="dataAcquisto">
            </div>

            <!-- Data di Scadenza -->
            <div class="form-group full-width" style="grid-column: span 2;">
                <label for="dataScadenza">Data di Scadenza:</label>
                <input type="date" id="dataScadenza">
            </div>

            <!-- Pulsante inserimento -->
            <button class="btn btn-aggiungi" id="btnAggiungi">Inserisci Prodotto nell'Inventario</button>
        </div>

        <!-- RIEPILOGO SPESA TOTALE -->
        <div class="recap-box">
            Totale Spesa Corrente: € <span id="totaleSpesa">0.00</span>
        </div>

        <!-- SEZIONE TABELLA INVENTARIO -->
        <div id="sezioneInventario" style="display: none;">
            <div class="action-buttons">
                <button class="btn btn-server" id="btnInviaServer">Salva sul Database Cloud</button>
                <button class="btn btn-reset" id="btnReset">Svuota Dispensa</button>
            </div>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Prodotto</th>
                            <th>Categoria</th>
                            <th>Prezzo Unitario</th>
                            <th>Q.tà</th>
                            <th>Totale Riga</th>
                            <th>Acquisto</th>
                            <th>Scadenza</th>
                            <th>Azione</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabella">
                        <!-- Righe popolate da JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- LOGICA JAVASCRIPT -->
    <script>
        // CONFIGURAZIONE CHIAVI DI CONDIZIONE DI ESEMPIO SUPABASE
        const SUPABASE_URL = "https://orskvejphkihjqblruvx.supabase.co/rest/v1/";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9yc2t2ZWpwaGtpaGpxYmxydXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNzE0NzEsImV4cCI6MjA5NDg0NzQ3MX0.83Vn6ji8exk_zesh0kiJjBTZsNFjHewHRqKyy6N7xl8";
        
        // Inizializzazione sicura e condizionale del client Supabase
        let supabaseClient = null;
        if (typeof window.supabase !== 'undefined' && SUPABASE_URL !== "https://IL_TUO_PROJECT_URL.supabase.co") {
            try {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            } catch(e) {
                console.error("Errore inizializzazione Supabase:", e);
            }
        }

        let inventario = [];
        let totaleEconomico = 0;
        let categoriaSelezionata = "";

        const inputNome = document.getElementById('nomeProdotto');
        const campoCategoria = document.getElementById('campoCategoria');
        const inputPrezzo = document.getElementById('prezzoProdotto');
        const inputQuantita = document.getElementById('quantitaProdotto');
        const inputAcquisto = document.getElementById('dataAcquisto');
        const inputScadenza = document.getElementById('dataScadenza');
        
        const btnAggiungi = document.getElementById('btnAggiungi');
        const btnInviaServer = document.getElementById('btnInviaServer');
        const btnReset = document.getElementById('btnReset');
        const corpoTabella = document.getElementById('corpoTabella');
        const areaSpesa = document.getElementById('totaleSpesa');
        const sezioneInventario = document.getElementById('sezioneInventario');

        const menuDinamico = document.getElementById('menuCategorie');
        const btnChiudiMenu = document.getElementById('btnChiudiMenu');
        const bottoniOpzione = document.querySelectorAll('.btn-opzione');

        window.addEventListener('DOMContentLoaded', () => {
            const oggi = new Date();
            const anno = oggi.getFullYear();
            const mese = String(oggi.getMonth() + 1).padStart(2, '0');
            const giorno = String(oggi.getDate()).padStart(2, '0');
            
            inputAcquisto.value = `${anno}-${mese}-${giorno}`;
            caricaDatiSito();
        });

        // Gestione Menu Categorie (Apertura)
        campoCategoria.addEventListener('click', (e) => {
            e.stopPropagation();
            menuDinamico.classList.toggle('aperto');
        });

        function chiudiMenu() {
            menuDinamico.classList.remove('aperto');
        }
        
        btnChiudiMenu.addEventListener('click', (e) => {
            e.stopPropagation();
            chiudiMenu();
        });

        document.addEventListener('click', chiudiMenu);
        menuDinamico.addEventListener('click', (e) => { e.stopPropagation(); });

        // Gestione selezione opzioni laterali
        bottoniOpzione.forEach(bottone => {
            bottone.addEventListener('click', (e) => {
                categoriaSelezionata = e.target.getAttribute('data-valore');
                campoCategoria.innerText = categoriaSelezionata;
                campoCategoria.style.borderColor = "#cbd5e1";
                chiudiMenu();
            });
        });

        // Azione: Aggiunta Prodotto Locale
        btnAggiungi.addEventListener('click', function() {
            const nome = inputNome.value.trim();
            const classe = categoriaSelezionata;
            const prezzo = parseFloat(inputPrezzo.value);
            const quantita = parseInt(inputQuantita.value);
            const acquisto = inputAcquisto.value;
            const scadenza = inputScadenza.value;

            if (nome === "") { alert("Inserisci il nome del prodotto!"); return; }
            if (classe === "") { alert("Seleziona una categoria!"); campoCategoria.style.borderColor = "#e53e3e"; return; }
            if (isNaN(prezzo) || prezzo < 0) { alert("Inserisci un prezzo valido!"); return; }
            if (isNaN(quantita) || quantita < 1) { alert("Inserisci una quantità valida!"); return; }
            if (!acquisto) { alert("Seleziona la data di acquisto!"); return; }
            if (!scadenza) { alert("Seleziona la data di scadenza!"); return; }

            const costoRiga = prezzo * quantita;
            const idProdotto = Date.now();

            const nuovoProdotto = { 
                id: idProdotto, 
                nome: nome, 
                classe: classe, 
                prezzo: prezzo, 
                quantita: quantita, 
                costoRiga: costoRiga,
                acquisto: acquisto, 
                scadenza: scadenza 
            };
            inventario.push(nuovoProdotto);

            salvaDatiSito();
            renderizzaRigaTabella(nuovoProdotto);
            aggiornaPrezzoTotale();

            // Pulisce i campi di inserimento
            inputNome.value = "";
            inputPrezzo.value = "";
            inputQuantita.value = "1";
            inputScadenza.value = "";
            categoriaSelezionata = "";
            campoCategoria.innerText = "Seleziona...";
        });

        function renderizzaRigaTabella(prodotto) {
            sezioneInventario.style.display = "block";
            const riga = `
                <tr id="riga-${prodotto.id}">
                    <td><b>${prodotto.nome}</b></td>
                    <td>${prodotto.classe}</td>
                    <td>€ ${prodotto.prezzo.toFixed(2)}</td>
                    <td>${prodotto.quantita}</td>
                    <td>€ ${prodotto.costoRiga.toFixed(2)}</td>
                    <td>${formattaData(prodotto.acquisto)}</td>
                    <td>${formattaData(prodotto.scadenza)}</td>
                    <td><button class="btn-elimina" onclick="eliminaProdotto(${prodotto.id})">Elimina</button></td>
                </tr>`;
            corpoTabella.innerHTML += riga;
        }

        function aggiornaPrezzoTotale() {
            totaleEconomico = inventario.reduce((somma, item) => somma + item.costoRiga, 0);
            areaSpesa.innerText = totaleEconomico.toFixed(2);
            
            if (inventario.length === 0) {
                sezioneInventario.style.display = "none";
            }
        }

        function formattaData(dataStringa) {
            if(!dataStringa) return "";
            const parti = dataStringa.split('-');
            if(parti.length !== 3) return dataStringa;
            return `${parti[2]}/${parti[1]}/${parti[0]}`;
        }

        window.eliminaProdotto = function(id) {
            document.getElementById(`riga-${id}`).remove();
            inventario = inventario.filter(item => item.id !== id);

            salvaDatiSito();
            aggiornaPrezzoTotale();
        }

        function salvaDatiSito() {
            localStorage.setItem('inventarioSpesa_LocalStorage', JSON.stringify(inventario));
        }

        function caricaDatiSito() {
            const datiSalvati = localStorage.getItem('inventarioSpesa_LocalStorage');
            if (datiSalvati) {
                inventario = JSON.parse(datiSalvati);
                inventario.forEach(item => {
                    renderizzaRigaTabella(item);
                });
                aggiornaPrezzoTotale();
            }
        }

        btnReset.addEventListener('click', function() {
            const conferma = confirm("Vuoi davvero svuotare tutto l'inventario locale? I dati inseriti andranno persi.");
            if (conferma) {
                localStorage.removeItem('inventarioSpesa_LocalStorage');
                inventario = [];
                corpoTabella.innerHTML = "";
                aggiornaPrezzoTotale();
            }
        });

        // Invio via API al database cloud
        btnInviaServer.addEventListener('click', async function() {
            if (!supabaseClient) {
                alert("Per effettuare il salvataggio remoto devi prima configurare le tue credenziali reali di Supabase (URL e KEY) all'interno del codice JavaScript.");
                return;
            }
            if (inventario.length === 0) {
                alert("Non ci sono prodotti da salvare sul database remoto!");
                return;
            }

            btnInviaServer.disabled = true;
            btnInviaServer.innerText = "Salvataggio cloud in corso...";

            const datiDaInviare = inventario.map(item => ({
                nome: item.nome,
                classe: item.classe,
                prezzo: item.prezzo,
                quantita: item.quantita,
                acquisto: item.acquisto,
                scadenza: item.scadenza
            }));

            try {
                const { data, error } = await supabaseClient
                    .from('prodotti')
                    .insert(datiDaInviare);

                if (error) throw error;

                alert("Fantastico! Tutti i dati sono stati registrati con successo nel database cloud.");
                
                localStorage.removeItem('inventarioSpesa_LocalStorage');
                inventario = [];
                corpoTabella.innerHTML = "";
                aggiornaPrezzoTotale();

            } catch (err) {
                console.error("Dettaglio Errore Server:", err);
                alert("Si è verificato un errore durante la comunicazione con il server. Controlla la console del browser.");
            } finally {
                btnInviaServer.disabled = false;
                btnInviaServer.innerText = "Salva sul Database Cloud";
            }
        });
    </script>
</body>
</html>
