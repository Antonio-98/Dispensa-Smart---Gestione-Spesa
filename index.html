<<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dispensa Smart - Gestione Inventario Casa</title>
    
    <!-- INCLUSIONE DELLA LIBRERIA CLIENT UFFICIALE DI SUPABASE VIA CDN -->
    <script src="https://jsdelivr.net"></script>
    
    <style>
        /* Stili Generali */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 30px;
            color: #333;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        h1 {
            margin-top: 0;
            color: #2c3e50;
            border-bottom: 3px solid #3498db;
            padding-bottom: 12px;
        }

        /* Form di inserimento in griglia */
        .form-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
        }

        .form-group.full-width {
            grid-column: span 3;
        }

        label {
            font-weight: 600;
            color: #4a5568;
            font-size: 14px;
        }

        input {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            width: 100%;
        }

        /* Pulsanti */
        .btn-container {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary {
            background-color: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background-color: #2980b9;
        }

        .btn-secondary {
            background-color: #2ecc71;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Dispensa Smart</h1>
    
    <!-- Esempio di Form per i dati richiesti -->
    <div class="form-grid">
        <div class="form-group"><label>Nome</label><input type="text" id="nome"></div>
        <div class="form-group"><label>Classe</label><input type="text" id="classe"></div>
        <div class="form-group"><label>Prezzo (€)</label><input type="number" step="0.01" id="prezzo" oninput="calcolaTotale()"></div>
        <div class="form-group"><label>Quantità</label><input type="number" id="quantita" oninput="calcolaTotale()"></div>
        <div class="form-group"><label>Totale Riga (€)</label><input type="number" id="totale_riga" readonly></div>
        <div class="form-group"><label>Acquisto</label><input type="date" id="acquisto"></div>
        <div class="form-group"><label>Scadenza</label><input type="date" id="scadenza"></div>
    </div>

    <div class="btn-container">
        <button class="btn btn-primary" onclick="inviaInDispensa()">Salva su Supabase</button>
        <button class="btn btn-secondary" onclick="esportaInCSV()">Esporta in CSV</button>
    </div>
</div>

<script>
    // Configura qui le tue credenziali Supabase
        const SUPABASE_URL = "https://orskvejphkihjqblruvx.supabase.co/rest/v1/";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9yc2t2ZWpwaGtpaGpxYmxydXZ4Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3OTI3MTQ3MSwiZXhwIjoyMDk0ODQ3NDcxfQ.DAjgXTsXsam82wgJw9L1k1C-T37FHdmVZCOkeWjnuV0";
    
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Calcolo automatico del totale riga
    function calcolaTotale() {
        const prezzo = parseFloat(document.getElementById('prezzo').value) || 0;
        const quantita = parseInt(document.getElementById('quantita').value) || 0;
        document.getElementById('totale_riga').value = (prezzo * quantita).toFixed(2);
    }

    // Estrae i dati inseriti nel form rispettando i nomi delle colonne richiesti
    function ottieniDatiForm() {
        return {
            nome: document.getElementById('nome').value,
            classe: document.getElementById('classe').value,
            prezzo: parseFloat(document.getElementById('prezzo').value) || 0,
            quantita: parseInt(document.getElementById('quantita').value) || 0,
            totale_riga: parseFloat(document.getElementById('totale_riga').value) || 0,
            acquisto: document.getElementById('acquisto').value,
            scadenza: document.getElementById('scadenza').value
        };
    }

    // Funzione 1: Esporta e salva i dati sul database Supabase
    async function inviaInDispensa() {
        const dati = ottieniDatiForm();
        
        if (!dati.nome) {
            alert("Inserisci almeno il nome del prodotto!");
            return;
        }

        // Sostituisci 'inventario' con il nome reale della tua tabella su Supabase
        const { data, error } = await supabase
            .from('inventario') 
            .insert([dati]);

        if (error) {
            console.error("Errore di inserimento:", error);
            alert("Errore durante il salvataggio su Supabase.");
        } else {
            alert("Dati salvati correttamente su Supabase!");
        }
    }

    // Funzione 2: Genera e scarica istantaneamente il file CSV
    function esportaInCSV() {
        const dati = ottieniDatiForm();

        // Intestazioni della tabella richieste
        const headers = ["nome", "classe", "prezzo", "quantita", "totale_riga", "acquisto", "scadenza"];
        
        // Costruzione delle righe (usa il punto e virgola come separatore standard italiano per Excel)
        const rigaValori = [
            `"${dati.nome.replace(/"/g, '""')}"`,
            `"${dati.classe.replace(/"/g, '""')}"`,
            dati.prezzo,
            dati.quantita,
            dati.totale_riga,
            dati.acquisto,
            dati.scadenza
        ];

        const contenutoCSV = [
            headers.join(";"),
            rigaValori.join(";")
        ].join("\n");

        // Creazione del file blob e trigger del download automatico
        const blob = new Blob([contenutoCSV], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        
        link.setAttribute("href", url);
        link.setAttribute("download", `esportazione_dispensa_${new Date().toISOString().slice(0,10)}.csv`);
        link.style.visibility = 'hidden';
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
