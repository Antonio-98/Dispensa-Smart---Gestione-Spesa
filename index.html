<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dispensa Smart - Gestione Inventario Casa</title>

    <!-- SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 30px;
            color: #333;
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        h1 {
            margin-top: 0;
            color: #2c3e50;
            border-bottom: 3px solid #3498db;
            padding-bottom: 12px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
        }

        .form-group.full-width {
            grid-column: span 3;
        }

        label {
            font-weight: 600;
            color: #4a5568;
            font-size: 14px;
        }

        input {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            width: 100%;
        }

        input:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        .finto-select {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 16px;
            background-color: #fff;
            cursor: pointer;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .finto-select::after {
            content: "▼";
            font-size: 11px;
            color: #718096;
        }

        .menu-laterale-campo {
            position: fixed;
            top: 120px;
            right: 40px;
            width: 320px;
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            z-index: 999999;
            padding: 20px;
            box-sizing: border-box;
            visibility: hidden;
            opacity: 0;
            transform: translateX(40px) scale(0.95);
            transition: all 0.35s ease;
        }

        .menu-laterale-campo.aperto {
            visibility: visible !important;
            opacity: 1 !important;
            transform: translateX(0) scale(1) !important;
        }

        .menu-laterale-campo h3 {
            margin-top: 0;
            font-size: 15px;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-chiudi-menu {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: #a0aec0;
        }

        .btn-chiudi-menu:hover {
            color: #e53e3e;
        }

        .opzioni-lista {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .btn-opzione {
            background-color: #f7fafc;
            border: 1px solid #e2e8f0;
            padding: 10px;
            text-align: left;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-opzione:hover {
            background-color: #3498db;
            color: white;
        }

        .btn {
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-aggiungi {
            background-color: #3498db;
            width: 100%;
            grid-column: span 3;
        }

        .btn-aggiungi:hover {
            background-color: #2980b9;
        }

        .action-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-server {
            background-color: #2ecc71;
        }

        .btn-server:hover {
            background-color: #27ae60;
        }

        .btn-export {
            background-color: #f39c12;
        }

        .btn-export:hover {
            background-color: #d68910;
        }

        .btn-reset {
            background-color: #e53e3e;
        }

        .btn-reset:hover {
            background-color: #c53030;
        }

        .recap-box {
            background-color: #ebf8ff;
            border-left: 4px solid #3182ce;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 25px;
            font-size: 18px;
            font-weight: bold;
            color: #2b6cb0;
        }

        .table-container {
            margin-top: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid #e2e8f0;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #f7fafc;
        }

        tr:nth-child(even) {
            background-color: #f8fafc;
        }

        .btn-elimina {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-elimina:hover {
            background: #c53030;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Dispensa Smart - Gestione Spesa</h1>

    <div class="form-grid">

        <div class="form-group full-width">
            <label>Nome Prodotto:</label>
            <input type="text" id="nomeProdotto">
        </div>

        <div class="form-group">
            <label>Categoria:</label>

            <div class="finto-select" id="campoCategoria">
                Seleziona...
            </div>

            <div class="menu-laterale-campo" id="menuCategorie">

                <h3>
                    Scegli Categoria
                    <button class="btn-chiudi-menu" id="btnChiudiMenu">
                        ×
                    </button>
                </h3>

                <div class="opzioni-lista">

                    <button class="btn-opzione" data-valore="Frutta">Frutta</button>
                    <button class="btn-opzione" data-valore="Verdure">Verdure</button>
                    <button class="btn-opzione" data-valore="Carboidrati">Carboidrati</button>
                    <button class="btn-opzione" data-valore="Carne">Carne</button>
                    <button class="btn-opzione" data-valore="Pesce">Pesce</button>
                    <button class="btn-opzione" data-valore="Latticini">Latticini</button>
                    <button class="btn-opzione" data-valore="Uova">Uova</button>
                    <button class="btn-opzione" data-valore="Altro">Altro</button>

                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Prezzo (€):</label>
            <input type="number" id="prezzoProdotto" step="0.01">
        </div>

        <div class="form-group">
            <label>Quantità (nr.):</label>
            <input type="number" id="quantitaNumero" min="1">
        </div>

        <div class="form-group">
            <label>Quantità (peso):</label>
            <input type="number" id="quantitaPeso" step="0.01" min="0">
        </div>

        <div class="form-group">
            <label>Data Acquisto:</label>
            <input type="date" id="dataAcquisto">
        </div>

        <div class="form-group full-width" style="grid-column: span 2;">
            <label>Data Scadenza:</label>
            <input type="date" id="dataScadenza">
        </div>

        <button class="btn btn-aggiungi" id="btnAggiungi">
            Inserisci Prodotto
        </button>

    </div>

    <div class="recap-box">
        Totale Spesa: € <span id="totaleSpesa">0.00</span>
    </div>

    <div id="sezioneInventario" style="display:none;">

        <div class="action-buttons">

            <button class="btn btn-server" id="btnInviaServer">
                Salva su Supabase
            </button>

            <button class="btn btn-export" id="btnExportCSV">
                Esporta CSV
            </button>

            <button class="btn btn-reset" id="btnReset">
                Svuota Dispensa
            </button>

        </div>

        <div class="table-container">

            <table>

                <thead>
                    <tr>
                        <th>Prodotto</th>
                        <th>Categoria</th>
                        <th>Prezzo</th>
                        <th>Q.tà</th>
                        <th>Totale</th>
                        <th>Acquisto</th>
                        <th>Scadenza</th>
                        <th>Azione</th>
                    </tr>
                </thead>

                <tbody id="corpoTabella"></tbody>

            </table>

        </div>

    </div>

</div>

<script>

    const SUPABASE_URL = "https://orskvejphkihjqblruvx.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9yc2t2ZWpwaGtpaGpxYmxydXZ4Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3OTI3MTQ3MSwiZXhwIjoyMDk0ODQ3NDcxfQ.DAjgXTsXsam82wgJw9L1k1C-T37FHdmVZCOkeWjnuV0";

    const supabaseClient = supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY
    );

    let inventario = [];
    let categoriaSelezionata = "";

    const inputNome = document.getElementById('nomeProdotto');
    const inputPrezzo = document.getElementById('prezzoProdotto');
    const inputQuantitaNumero = document.getElementById('quantitaNumero');
    const inputQuantitaPeso = document.getElementById('quantitaPeso');
    const inputAcquisto = document.getElementById('dataAcquisto');
    const inputScadenza = document.getElementById('dataScadenza');

    const campoCategoria = document.getElementById('campoCategoria');

    const corpoTabella = document.getElementById('corpoTabella');

    const areaSpesa = document.getElementById('totaleSpesa');

    const sezioneInventario = document.getElementById('sezioneInventario');

    const btnAggiungi = document.getElementById('btnAggiungi');
    const btnInviaServer = document.getElementById('btnInviaServer');
    const btnReset = document.getElementById('btnReset');
    const btnExportCSV = document.getElementById('btnExportCSV');

    const menuCategorie = document.getElementById('menuCategorie');

    // ===== MENU CATEGORIA =====

    // Apertura menu
    campoCategoria.onclick = function(event) {
    
        event.stopPropagation();
    
        if (menuCategorie.classList.contains("aperto")) {
    
            menuCategorie.classList.remove("aperto");
    
        } else {
    
            menuCategorie.classList.add("aperto");
    
        }
    
    };
    
    // Click sulle categorie
    document.querySelectorAll('.btn-opzione').forEach(btn => {
    
        btn.onclick = function(event) {
    
            event.stopPropagation();
    
            categoriaSelezionata = this.dataset.valore;
    
            campoCategoria.innerText = categoriaSelezionata;
    
            menuCategorie.classList.remove("aperto");
    
        };
    
    });
    
    // Evita chiusura cliccando dentro il menu
    menuCategorie.onclick = function(event) {
    
        event.stopPropagation();
    
    };
    
    // Chiusura cliccando fuori
    document.body.onclick = function() {
    
        menuCategorie.classList.remove("aperto");
    
    };
    
    // Pulsante X
    btnChiudiMenu.onclick = function(event) {
    
        event.stopPropagation();
    
        menuCategorie.classList.remove("aperto");
    
    };

    window.addEventListener('DOMContentLoaded', () => {

        const oggi = new Date().toISOString().split('T')[0];

        inputAcquisto.value = oggi;

        caricaDati();

    });

    btnAggiungi.addEventListener('click', () => {

        const nome = inputNome.value.trim();

        const prezzo = parseFloat(inputPrezzo.value);

        const quantitaNumero = parseFloat(inputQuantitaNumero.value);
    
        const quantitaPeso = parseFloat(inputQuantitaPeso.value);

        const acquisto = inputAcquisto.value;

        const scadenza = inputScadenza.value;

        // Controllo quale quantità usare
        let quantita = null;
    
        if (!isNaN(quantitaNumero) && quantitaNumero > 0) {

        quantita = quantitaNumero;

        } else if (!isNaN(quantitaPeso) && quantitaPeso > 0) {

        quantita = quantitaPeso;

        }

        if (
        !nome ||
        !categoriaSelezionata ||
        isNaN(prezzo) ||
        quantita === null
        ) {

            alert("Compila tutti i campi!");

            return;

        }

        const prodotto = {
            id: Date.now(),
            nome,
            classe: categoriaSelezionata,
            prezzo,
            quantita,
            costoRiga: prezzo * quantita,
            acquisto,
            scadenza

        };

        inventario.push(prodotto);
    
        salvaDati();
    
        renderizzaRiga(prodotto);
    
        aggiornaTotale();
    
        // Reset campi
        inputNome.value = "";
    
        inputPrezzo.value = "";
    
        inputQuantitaNumero.value = "";
    
        inputQuantitaPeso.value = "";
    
        inputScadenza.value = "";
    
        categoriaSelezionata = "";
    
        campoCategoria.innerText = "Seleziona...";

    });

        inventario.push(prodotto);

        salvaDati();

        renderizzaRiga(prodotto);

        aggiornaTotale();

        inputNome.value = "";
        inputPrezzo.value = "";
        inputQuantita.value = "1";
        inputScadenza.value = "";

        categoriaSelezionata = "";

        campoCategoria.innerText = "Seleziona...";

    });

    function renderizzaRiga(prodotto) {

        sezioneInventario.style.display = "block";

        corpoTabella.innerHTML += `
        
            <tr id="riga-${prodotto.id}">
            
                <td>${prodotto.nome}</td>
                <td>${prodotto.classe}</td>
                <td>€ ${prodotto.prezzo.toFixed(2)}</td>
                <td>${prodotto.quantita}</td>
                <td>€ ${prodotto.costoRiga.toFixed(2)}</td>
                <td>${prodotto.acquisto}</td>
                <td>${prodotto.scadenza}</td>

                <td>
                    <button class="btn-elimina"
                        onclick="eliminaProdotto(${prodotto.id})">
                        Elimina
                    </button>
                </td>

            </tr>

        `;
    }

    function aggiornaTotale() {

        const totale = inventario.reduce(
            (somma, item) => somma + item.costoRiga,
            0
        );

        areaSpesa.innerText = totale.toFixed(2);

        if (inventario.length === 0) {

            sezioneInventario.style.display = "none";

        }
    }

    window.eliminaProdotto = function(id) {

        inventario = inventario.filter(item => item.id !== id);

        document.getElementById(`riga-${id}`).remove();

        salvaDati();

        aggiornaTotale();

    }

    function salvaDati() {

        localStorage.setItem(
            'inventarioSpesa',
            JSON.stringify(inventario)
        );

    }

    function caricaDati() {

        const dati = localStorage.getItem('inventarioSpesa');

        if (!dati) return;

        inventario = JSON.parse(dati);

        inventario.forEach(renderizzaRiga);

        aggiornaTotale();

    }

    btnReset.addEventListener('click', () => {

        if (!confirm("Vuoi svuotare la dispensa?")) return;

        inventario = [];

        corpoTabella.innerHTML = "";

        localStorage.removeItem('inventarioSpesa');

        aggiornaTotale();

    });

    // EXPORT CSV
btnExportCSV.addEventListener('click', () => {

    if (inventario.length === 0) {

        alert("Nessun dato da esportare!");

        return;

    }

    // Export CSV
    let csv =
        "nome;classe;prezzo;quantita;totale_riga;acquisto;scadenza\n";

    // Righe dati
    inventario.forEach(item => {

        csv += `${item.nome};`;
        csv += `${item.classe};`;
        csv += `${item.prezzo.toFixed(2)};`;
        csv += `${item.quantita};`;
        csv += `${item.costoRiga.toFixed(2)};`;
        csv += `${item.acquisto};`;
        csv += `${item.scadenza}\n`;

    });

    // UTF-8 BOM per Excel
    const csvContent = "\uFEFF" + csv;

    const blob = new Blob(
        [csvContent],
        { type: 'text/csv;charset=utf-8;' }
    );

    const link = document.createElement("a");

    const url = URL.createObjectURL(blob);

    link.setAttribute("href", url);

    link.setAttribute(
        "download",
        `inventario_${Date.now()}.csv`
    );

    document.body.appendChild(link);

    link.click();

    document.body.removeChild(link);

});

    // SALVATAGGIO SUPABASE
    btnInviaServer.addEventListener('click', async () => {

        if (inventario.length === 0) {

            alert("Nessun prodotto da inviare!");

            return;

        }

        btnInviaServer.disabled = true;

        btnInviaServer.innerText = "Invio in corso...";

        try {

           const dati = inventario.map(item => ({

    nome: item.nome,
    classe: item.classe,
    prezzo: item.prezzo,
    quantita: item.quantita,
    totale_riga: item.costoRiga,
    acquisto: item.acquisto,
    scadenza: item.scadenza

}));

            const { error } = await supabaseClient
                .from('prodotti')
                .insert(dati);

            if (error) throw error;

            alert("Dati salvati su Supabase!");

        } catch (err) {

            console.error(err);

            alert("Errore invio Supabase!");

        } finally {

            btnInviaServer.disabled = false;

            btnInviaServer.innerText = "Salva su Supabase";

        }

    });

</script>

</body>
</html>
